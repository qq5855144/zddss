
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>工作日记 · 云同步</title>
    <style>
        :root {
            --bg-color: #E0E5EC;
            --primary-color: #6D5B98;
            --light-shadow: #FFFFFF;
            --dark-shadow: #A3B1C6;
            --text-color: #2D3748;
            --success-color: #48BB78;
            --danger-color: #F56565;
            --card-padding: 15px;
            --card-margin: 10px;
            --green-fill: #C6F6D5; 
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 10px;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            font-size: 14px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0;
            padding-bottom: 80px; 
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin: 10px 0 20px 0;
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px var(--dark-shadow), -2px -2px 4px var(--light-shadow);
            letter-spacing: 0.5px;
            padding: 0 10px;
        }
        .toast {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease-out;
            box-shadow: 4px 4px 8px var(--dark-shadow), -4px -4px 8px var(--light-shadow);
            font-weight: 500;
            font-size: 14px;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-container {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 5px 5px 10px var(--dark-shadow), -5px -5px 10px var(--light-shadow);
        }
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input[type="date"],
        input[type="text"],
        input[type="number"],
        input[type="password"] {
            width: 100%;
            padding: 16px 15px;
            border: none;
            border-radius: 12px;
            background-color: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
            color: var(--text-color);
            font-size: 14px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }
        input:focus {
            outline: none;
            box-shadow: 3px 3px 6px var(--dark-shadow), -3px -3px 6px var(--light-shadow);
        }
        textarea {
            width: 100%;
            padding: 16px 15px;
            border: none;
            border-radius: 12px;
            background-color: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
            color: var(--text-color);
            font-size: 14px;
            font-family: 'Microsoft YaHei', sans-serif;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
            resize: vertical;
            min-height: 80px;
        }
        textarea:focus {
            outline: none;
            box-shadow: 3px 3px 6px var(--dark-shadow), -3px -3px 6px var(--light-shadow);
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .button-group button {
            flex: 1;
            margin: 0;
            min-width: 100px;
        }
        button {
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 8px var(--dark-shadow), -4px -4px 8px var(--light-shadow);
        }
        
        .add-button {
            background-color: var(--primary-color) !important;
            color: white !important;
            box-shadow: 4px 4px 8px rgba(109, 91, 152, 0.3), -4px -4px 8px rgba(255,255,255,0.8) !important;
            font-weight: 700 !important;
            letter-spacing: 0.5px;
        }
        .add-button:hover, .add-button:active {
            background-color: #5A4B80 !important;
            box-shadow: 2px 2px 4px rgba(109,91,152,0.3), -2px -2px 4px rgba(255,255,255,0.8) !important;
            transform: translateY(2px);
        }

        /* 日历卡片样式 */
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .calendar-title {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 16px;
        }
        .calendar-nav button {
    padding: 0;
    margin: 0 2px;
    width: 32px;
    height: 32px;
    box-shadow: 3px 3px 6px var(--dark-shadow), -3px -3px 6px var(--light-shadow);
    background: var(--bg-color);
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 0;
    cursor: pointer;
    transform: none;
}

.calendar-nav button:active {
    transform: none;
    box-shadow: 3px 3px 6px var(--dark-shadow), -3px -3px 6px var(--light-shadow);
}

.calendar-nav button img {
    display: block;
    width: 20px;
    height: 20px;
    margin: 0;
    vertical-align: middle;
}
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-weekday {
            font-weight: 600;
            color: var(--primary-color);
            padding: 8px 0;
            font-size: 12px;
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: var(--bg-color);
            box-shadow: inset 2px 2px 5px var(--dark-shadow), inset -2px -2px 5px var(--light-shadow);
            font-size: 12px;
            font-weight: 500;
            padding: 2px;
            transition: all 0.1s;
            color: var(--text-color);
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }
        .calendar-day.no-record {
            background: var(--green-fill);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05), inset -2px -2px 5px rgba(255,255,255,0.5);
        }
        .calendar-day.past-rest {
            background: #FED7D7;
            box-shadow: inset 2px 2px 5px rgba(245,101,101,0.08), inset -2px -2px 5px rgba(255,255,255,0.6);
            color: #C53030;
            font-weight: 500;
        }
        .calendar-day.has-record {
            background: #EDE7F6;
            box-shadow: inset 2px 2px 5px rgba(109,91,152,0.1), inset -2px -2px 5px rgba(255,255,255,0.8);
            color: var(--primary-color);
            font-weight: 600;
        }
        .day-number {
            font-size: 13px;
            line-height: 1.2;
        }
        .day-hours {
            font-size: 9px;
            font-weight: 600;
            opacity: 0.8;
            margin-top: 2px;
        }
        .calendar-day.today {
            border: 2px solid var(--primary-color);
            box-shadow: 2px 2px 6px var(--dark-shadow);
        }
        .calendar-day.pressing {
            transform: scale(0.92);
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
        }

        /* 工资浮动提示 */
        .day-wage-tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: var(--bg-color);
            border-radius: 14px;
            padding: 10px 14px;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease-out;
            box-shadow: 5px 5px 10px var(--dark-shadow), -5px -5px 10px var(--light-shadow);
            white-space: nowrap;
            font-size: 12px;
            color: var(--text-color);
        }
        .day-wage-tooltip.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .day-wage-tooltip .tooltip-date {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
            font-size: 13px;
            text-align: center;
        }
        .day-wage-tooltip .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 2px 0;
        }
        .day-wage-tooltip .tooltip-label {
            color: #666;
        }
        .day-wage-tooltip .tooltip-value {
            font-weight: 700;
            color: var(--primary-color);
        }
        .day-wage-tooltip .tooltip-total {
            border-top: 1px solid rgba(163,177,198,0.3);
            margin-top: 4px;
            padding-top: 4px;
        }
        .day-wage-tooltip .tooltip-total .tooltip-value {
            color: var(--success-color);
            font-size: 13px;
        }
        .day-wage-tooltip.position-bottom {
            top: auto;
            bottom: auto;
            margin-top: 8px;
        }
        .wage-tooltip-arrow {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 6px solid transparent;
            pointer-events: none;
            z-index: 501;
        }
        .wage-tooltip-arrow.arrow-bottom {
            bottom: calc(100% + 2px);
            border-top-color: var(--bg-color);
            border-bottom: none;
        }
        .wage-tooltip-arrow.arrow-top {
            top: calc(100% + 2px);
            border-bottom-color: var(--bg-color);
            border-top: none;
        }

        /* 长按上下文菜单 */
        .context-menu {
            position: fixed;
            background: var(--bg-color);
            border-radius: 16px;
            padding: 8px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
            animation: menuFadeIn 0.15s ease-out;
        }
        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            box-shadow: none !important;
            transform: none !important;
        }
        .context-menu-item:active {
            box-shadow: inset 2px 2px 4px var(--dark-shadow), inset -2px -2px 4px var(--light-shadow) !important;
            transform: none !important;
        }
        .context-menu-item.edit-item {
            color: var(--primary-color);
        }
        .context-menu-item.view-item {
            color: #3182CE;
        }
        .context-menu-item.delete-item {
            color: var(--danger-color);
        }
        .context-menu-divider {
            height: 1px;
            background: rgba(163,177,198,0.4);
            margin: 4px 8px;
        }
        .context-menu-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.15);
            z-index: 1999;
            display: none;
        }

        /* 统计页样式 */
        .summary-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .summary-card {
            background: var(--bg-color);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 5px 5px 10px var(--dark-shadow), -5px -5px 10px var(--light-shadow);
        }
        .summary-card h3 {
            color: var(--primary-color);
            margin: 0 0 12px 0;
            font-size: 16px;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(109,91,152,0.2);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(163,177,198,0.2);
        }
        .summary-row:last-child {
            border-bottom: none;
        }
        .summary-label {
            color: var(--text-color);
            font-weight: 600;
            font-size: 14px;
        }
        .summary-value {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 14px;
        }

        /* 编辑/查看模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;            
            position: relative;
        }
        .modal-header {
            color: var(--primary-color);
            font-size: 18px;
            margin: 0 0 15px 0;
            font-weight: 700;
            text-align: center;
        }
        .modal-body {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: inset 3px 3px 6px var(--dark-shadow), inset -3px -3px 6px var(--light-shadow);
            font-size: 14px;
            line-height: 1.6;
            max-height: 50vh;
            overflow-y: auto;
        }
        .modal-close {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            box-shadow: 4px 4px 8px var(--dark-shadow), -4px -4px 8px var(--light-shadow);
        }
        .edit-form-row {
            margin-bottom: 12px;
        }
        .edit-form-row label {
            display: block;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 6px;
            font-size: 13px;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-color);
            padding: 8px 5px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 100;
            border-top: 1px solid rgba(163,177,198,0.3);
        }
        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 6px;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 12px;
            min-width: 60px;
            flex: 0 1 auto;
        }
        .nav-button i {
            font-size: 20px;
            margin-bottom: 2px;
        }
        .nav-button img {
            width: 22px;
            height: 22px;
            margin-bottom: 2px;
            filter: drop-shadow(2px 2px 2px var(--dark-shadow));
        }
        .nav-button.active {
            color: var(--primary-color);
            background-color: var(--bg-color);
            box-shadow: inset 3px 3px 6px var(--dark-shadow), inset -3px -3px 6px var(--light-shadow);
            font-weight: 700;
        }
        .nav-button:active:not(.active) {
            transform: translateY(2px);
        }

        /* 配置界面特有样式 */
        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }
        .setting-row label {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 14px;
            margin-left: 5px;
        }
        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px solid rgba(163,177,198,0.3);
            border-bottom: 1px solid rgba(163,177,198,0.3);
        }
        .switch-label {
            font-weight: 600;
            color: var(--text-color);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--dark-shadow);
            transition: 0.3s;
            border-radius: 34px;
            box-shadow: inset 2px 2px 5px var(--dark-shadow), inset -2px -2px 5px var(--light-shadow);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
            box-shadow: 2px 2px 4px var(--dark-shadow);
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .github-badge {
            background-color: var(--bg-color);
            padding: 10px 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 13px;
            color: var(--text-color);
            word-break: break-all;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .flex-row button {
            flex: 1;
            padding: 12px 5px;
        }
        .danger-text {
            color: var(--danger-color);
        }

        /* 删除确认弹窗 */
        .delete-confirm {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.3);
            z-index: 1001;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .delete-confirm-content {
            background: var(--bg-color);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .delete-confirm-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .delete-confirm-buttons button { flex: 1; }
        .delete-confirm-buttons button:first-child {
            background-color: var(--danger-color);
            color: white;
        }

        @media (max-width: 360px) {
            body { padding: 8px; font-size: 13px; padding-bottom: 75px; }
            h1 { font-size: 1.4rem; }
            .section-container { padding: 12px; margin-bottom: 12px; }
            input[type="date"], input[type="text"], input[type="number"], input[type="password"] { padding: 14px 12px; font-size: 13px; }
            button { padding: 10px 12px; font-size: 13px; }
            .summary-card { padding: 12px; }
            .summary-card h3 { font-size: 15px; }
            .summary-label, .summary-value { font-size: 13px; }
            .bottom-nav { padding: 6px 2px; }
            .nav-button { min-width: 55px; padding: 4px 2px; font-size: 10px; }
            .nav-button img { width: 20px; height: 20px; }
            .calendar-day { font-size: 10px; }
            .day-number { font-size: 11px; }
            .day-hours { font-size: 8px; }
            .context-menu { min-width: 120px; }
            .context-menu-item { padding: 10px 12px; font-size: 13px; }
        }
        @media (max-width: 320px) {
            .nav-button { min-width: 48px; padding: 4px 2px; font-size: 9px; }
        }
        @supports (-webkit-overflow-scrolling: touch) {
            input, textarea { font-size: 16px !important; }
        }
    </style>
</head>
<body>
    <h1>工作日记 · 云同步</h1>
    <div class="toast" id="toast"></div>

    <div class="context-menu-overlay" id="context-menu-overlay" onclick="hideContextMenu()"></div>
    <div class="context-menu" id="context-menu">
        <div class="context-menu-item view-item" id="menu-view" onclick="handleMenuAction('view')">
            <img src="https://api.iconify.design/material-symbols:visibility-rounded.svg?color=%233182CE" width="18" height="18" alt=""><span>查看</span>
        </div>
        <div class="context-menu-item edit-item" id="menu-edit" onclick="handleMenuAction('edit')">
            <img src="https://api.iconify.design/material-symbols:edit-rounded.svg?color=%236D5B98" width="18" height="18" alt=""><span>编辑</span>
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item delete-item" id="menu-delete" onclick="handleMenuAction('delete')">
            <img src="https://api.iconify.design/material-symbols:delete-rounded.svg?color=%23F56565" width="18" height="18" alt=""><span>删除</span>
        </div>
    </div>

    <!-- 添加记录页 -->
    <div id="add-page" class="page active">
        <div class="section-container">
            <div class="add-form">
                <div class="input-row">
                    <input type="date" id="date-input" required title="请点击选择工作日期" onfocus="this.showPicker()">
                    <input type="number" id="hours-input" min="0" step="0.5" placeholder="请输入工时（天）" title="按天计算（1天=8小时）" required>
                    <input type="number" id="wage-input" min="0" step="100" placeholder="请输入日工资（元）" title="请输入当日约定工资" required>

    <div id="github-page" class="page">

    <!-- 删除确认弹窗 -->
    <div class="delete-confirm" id="delete-confirm">
        <div class="delete-confirm-content">

    <!-- 编辑模态框 -->
    <div class="delete-confirm" id="edit-modal" style="z-index: 1002;">
        <div class="delete-confirm-content" style="max-width: 450px; text-align: left;">
            <h3 style="text-align: center; color: var(--primary-color); margin-bottom: 15px;">编辑记录</h3>
            <div class="edit-form-row">
                <label>日期</label>
                <input type="text" id="edit-date-display" readonly style="background: rgba(0,0,0,0.05); cursor: not-allowed;">
                <input type="hidden" id="edit-date">
            </div>
            <div class="edit-form-row">
                <label>工时（天）</label>
                <input type="number" id="edit-hours" min="0" step="0.5" placeholder="请输入工时">
            </div>
            <div class="edit-form-row">
                <label>日工资（元）</label>
                <input type="number" id="edit-wage" min="0" step="100" placeholder="请输入日工资">
            </div>
            <div class="edit-form-row">
                <label>工作内容</label>
                <textarea id="edit-content" placeholder="请输入工作内容"></textarea>
            </div>
            <div class="delete-confirm-buttons" style="margin-top: 15px;">
                <button onclick="saveEdit()" class="add-button" style="background-color: var(--primary-color) !important; color: white !important;">保存</button>
                <button onclick="closeEditModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * 工作日记 · 云同步
         * 本地存储 + GitHub Gist 双备份的工时记录应用
         */

        // ============================================================
        // 状态变量
        // ============================================================
        let workLogs = JSON.parse(localStorage.getItem('workLogs')) || [];
        let lastWage = parseFloat(localStorage.getItem('lastWage')) || null;
        let lastHours = parseFloat(localStorage.getItem('lastHours')) || null;
        let deleteDate = null;
        let currentDisplayYear = new Date().getFullYear();
        let currentDisplayMonth = new Date().getMonth();

        // 上下文菜单状态
        let contextMenuDate = null;
        let contextMenuRecord = null;
        let longPressTimer = null;
        let longPressTarget = null;
        const LONG_PRESS_DURATION = 500;

        // 浮动提示状态
        let activeWageTooltip = null;

        // ============================================================
        // GitHub 配置模块
        // ============================================================
        let githubConfig = {
            token: '',
            owner: '',
            repo: '',
            autoSync: false
        };

        function loadGithubConfig() {
            const saved = localStorage.getItem('githubConfig');
            if (saved) {
                try { githubConfig = JSON.parse(saved); } catch (e) {}
            }
            document.getElementById('github-token').value = githubConfig.token || '';
            document.getElementById('github-repo').value = githubConfig.repo || '';
            document.getElementById('auto-sync-checkbox').checked = githubConfig.autoSync || false;
            updateOwnerBadge();
        }

        function saveGithubConfig() {
            localStorage.setItem('githubConfig', JSON.stringify(githubConfig));
        }

        function updateOwnerBadge() {
            const badge = document.getElementById('github-owner-badge');
            if (githubConfig.owner) {
                badge.innerHTML = '&#9989; 验证成功 (' + githubConfig.owner + ')';
            } else {
                badge.innerHTML = '&#9888;&#65039; 未验证所有者，请输入token';
            }
        }

        async function validateTokenAndFetchOwner(token) {
            if (!token) return null;
            try {
                const res = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': 'token ' + token }
                });
                if (!res.ok) throw new Error('Token无效或权限不足');
                const user = await res.json();
                githubConfig.token = token;
                githubConfig.owner = user.login;
                saveGithubConfig();
                updateOwnerBadge();
                showToast('&#9989; 所有者 ' + user.login + ' 验证成功');
                return user.login;
            } catch (e) {
                showToast('&#10060; ' + e.message);
                githubConfig.owner = '';
                githubConfig.token = '';
                saveGithubConfig();
                updateOwnerBadge();
                return null;
            }
        }

        async function handleTokenBlur(e) {
            const token = e.target.value.trim();
            if (token) {
                await validateTokenAndFetchOwner(token);
            } else {
                githubConfig.token = '';
                githubConfig.owner = '';
                saveGithubConfig();
                updateOwnerBadge();
            }
        }
        document.getElementById('github-token').addEventListener('blur', handleTokenBlur);

        function handleRepoChange(e) {
            githubConfig.repo = e.target.value.trim();
            saveGithubConfig();
        }
        document.getElementById('github-repo').addEventListener('change', handleRepoChange);

        function handleAutoSyncChange(e) {
            githubConfig.autoSync = e.target.checked;
            saveGithubConfig();
        }
        document.getElementById('auto-sync-checkbox').addEventListener('change', handleAutoSyncChange);

        // ============================================================
        // GitHub 同步模块
        // ============================================================
        const BACKUP_PATH = 'work_diary_backup.json';

        async function syncToGithub(manual) {
            if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
                if (manual) showToast('请先完成token验证和仓库填写');
                return false;
            }
            const url = 'https://api.github.com/repos/' + githubConfig.owner + '/' + githubConfig.repo + '/contents/' + BACKUP_PATH;
            const dataToUpload = {
                workLogs: workLogs,
                lastWage: lastWage,
                lastHours: lastHours,
                version: '1.0',
                timestamp: new Date().toISOString()
            };
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToUpload, null, 2))));
            try {
                let sha = null;
                try {
                    const getRes = await fetch(url, { headers: { 'Authorization': 'token ' + githubConfig.token } });
                    if (getRes.ok) { const meta = await getRes.json(); sha = meta.sha; }
                    else if (getRes.status !== 404) throw new Error('获取文件信息失败');
                } catch (e) {}
                const body = { message: sha ? '更新工作日记备份' : '创建工作日记备份', content: content };
                if (sha) body.sha = sha;
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': 'token ' + githubConfig.token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!putRes.ok) throw new Error('上传失败 (' + putRes.status + ')');
                showToast('&#9989; 已同步到 GitHub');
                return true;
            } catch (err) {
                console.error(err);
                showToast('&#10060; 同步失败: ' + err.message);
                return false;
            }
        }

        async function syncFromGithub() {
            if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
                showToast('请先完成token验证和仓库填写');
                return;
            }
            const url = 'https://api.github.com/repos/' + githubConfig.owner + '/' + githubConfig.repo + '/contents/' + BACKUP_PATH;
            try {
                const res = await fetch(url, { headers: { 'Authorization': 'token ' + githubConfig.token } });
                if (!res.ok) throw new Error('云端文件不存在或无法访问');
                const meta = await res.json();
                const content = decodeURIComponent(escape(atob(meta.content)));
                const remoteData = JSON.parse(content);
                if (remoteData.workLogs && Array.isArray(remoteData.workLogs)) {
                    if (!confirm('从云端同步将覆盖本地所有数据，确定继续？')) return;
                    workLogs = remoteData.workLogs;
                    lastWage = remoteData.lastWage || null;
                    lastHours = remoteData.lastHours || null;
                    sortWorkLogs();
                    localStorage.setItem('workLogs', JSON.stringify(workLogs));
                    if (lastWage !== null) localStorage.setItem('lastWage', lastWage);
                    if (lastHours !== null) localStorage.setItem('lastHours', lastHours);
                    clearForm();
                    updateSummary();
                    renderCalendarView();
                    showToast('&#9989; 从云端同步成功');
                } else throw new Error('数据格式错误');
            } catch (err) { showToast('&#10060; 拉取失败: ' + err.message); }
        }

        async function manualPushToGithub() { await syncToGithub(true); }
        async function manualPullFromGithub() { await syncFromGithub(); }
        async function triggerAutoSync() {
            if (githubConfig.autoSync) await syncToGithub(false);
        }

        // ============================================================
        // 数据操作模块
        // ============================================================
        function sortWorkLogs() {
            workLogs.sort(function compareByDateDesc(a, b) { return new Date(b.date) - new Date(a.date); });
        }

        function setDefaultDate() {
            const today = new Date();
            document.getElementById('date-input').value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return String(date.getMonth()+1).padStart(2,'0') + '/' + String(date.getDate()).padStart(2,'0');
        }

        function formatDateFull(dateString) {
            const date = new Date(dateString);
            return date.getFullYear() + '年' + String(date.getMonth()+1).padStart(2,'0') + '月' + String(date.getDate()).padStart(2,'0') + '日';
        }

        async function addWorkLog() {
            const date = document.getElementById('date-input').value;
            const content = document.getElementById('content-input').value.trim();
            const hours = parseFloat(document.getElementById('hours-input').value);
            const wage = parseFloat(document.getElementById('wage-input').value);
            if (!date) { showToast('请选择日期！'); return; }
            if (hours < 0 || isNaN(hours)) { showToast('请输入有效的工时数值'); return; }
            if (wage < 0 || isNaN(wage)) { showToast('请输入有效的工资数值'); return; }
            function findByDate(log) { return log.date === date; }
            const existingIndex = workLogs.findIndex(findByDate);
            if (existingIndex !== -1) {
                if (!confirm('该日期已有记录，是否覆盖？')) { showToast('已取消添加'); return; }
                else workLogs.splice(existingIndex, 1);
            }
            lastHours = hours; lastWage = wage;
            localStorage.setItem('lastHours', hours);
            localStorage.setItem('lastWage', wage);
            workLogs.push({ date: date, content: content, hours: hours, wage: wage });
            sortWorkLogs();
            localStorage.setItem('workLogs', JSON.stringify(workLogs));
            updateSummary();
            renderCalendarView();
            clearForm();
            showToast('记录添加成功！');
            await triggerAutoSync();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.style.display = 'block';
            setTimeout(function hideToastTimer() { toast.style.display = 'none'; }, 2000);
        }

        function clearForm() {
            setDefaultDate();
            document.getElementById('content-input').value = '';
            document.getElementById('hours-input').value = (lastHours !== null && !isNaN(lastHours)) ? lastHours : '';
            document.getElementById('wage-input').value = (lastWage !== null && !isNaN(lastWage)) ? lastWage : '';
        }

        // ============================================================
        // 删除操作模块
        // ============================================================
        function showDeleteConfirm(date) {
            deleteDate = date;
            function matchByDate(l) { return l.date === date; }
            const log = workLogs.find(matchByDate);
            const dateText = log ? formatDateFull(log.date) : date;
            document.getElementById('delete-confirm-text').textContent = '确定要删除 ' + dateText + ' 的记录吗？此操作无法撤销。';
            document.getElementById('delete-confirm').style.display = 'flex';
        }

        async function confirmDelete() {
            if (!deleteDate) { cancelDelete(); return; }
            function findByDeleteDate(log) { return log.date === deleteDate; }
            const index = workLogs.findIndex(findByDeleteDate);
            if (index === -1) { showToast('记录不存在'); cancelDelete(); return; }
            workLogs.splice(index, 1);
            sortWorkLogs();
            localStorage.setItem('workLogs', JSON.stringify(workLogs));
            updateSummary();
            renderCalendarView();
            showToast('记录已删除');
            cancelDelete();
            triggerAutoSync().catch(function noop() {});
        }

        function cancelDelete() { deleteDate = null; document.getElementById('delete-confirm').style.display = 'none'; }

        function showDeleteAllConfirm() { document.getElementById('delete-all-confirm').style.display = 'flex'; }

        async function confirmDeleteAll() {
            workLogs = [];
            localStorage.removeItem('workLogs');
            localStorage.removeItem('lastWage');
            localStorage.removeItem('lastHours');
            lastWage = null;
            lastHours = null;
            document.getElementById('hours-input').value = '';
            document.getElementById('wage-input').value = '';
            updateSummary();
            renderCalendarView();
            showToast('所有数据已删除');
            cancelDeleteAll();
            triggerAutoSync().catch(function noop() {});
        }

        function cancelDeleteAll() { document.getElementById('delete-all-confirm').style.display = 'none'; }

        // ============================================================
        // 内容展示与编辑模块
        // ============================================================
        function showContent(dateOrIndex) {
            let log;
            if (typeof dateOrIndex === 'number') {
                log = workLogs[dateOrIndex];
            } else {
                log = workLogs.find(function matchDateOrIndex(l) { return l.date === dateOrIndex; });
            }
            if (!log || !log.content) return;
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.onclick = function handleOverlayClick(e) { if (e.target === overlay) overlay.remove(); };
            const modal = document.createElement('div');
            modal.className = 'modal-content';
            modal.innerHTML = '<h3 class="modal-header">' + new Date(log.date).toLocaleDateString('zh-CN') + ' 工作详情</h3>' +
                '<div class="modal-body">' + log.content.replace(/\n/g, '<br>') + '</div>' +
                '<button class="modal-close" onclick="this.parentElement.parentElement.remove()">关闭</button>';
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
        }

        function openEditModal(dateStr) {
            function findByDateStr(l) { return l.date === dateStr; }
            const log = workLogs.find(findByDateStr);
            if (!log) return;
            document.getElementById('edit-date').value = log.date;
            document.getElementById('edit-date-display').value = formatDateFull(log.date);
            document.getElementById('edit-hours').value = log.hours;
            document.getElementById('edit-wage').value = log.wage;
            document.getElementById('edit-content').value = log.content || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        async function saveEdit() {
            const date = document.getElementById('edit-date').value;
            const hours = parseFloat(document.getElementById('edit-hours').value);
            const wage = parseFloat(document.getElementById('edit-wage').value);
            const content = document.getElementById('edit-content').value.trim();
            if (!date) { showToast('日期无效'); return; }
            if (hours < 0 || isNaN(hours)) { showToast('请输入有效的工时数值'); return; }
            if (wage < 0 || isNaN(wage)) { showToast('请输入有效的工资数值'); return; }
            function findEditDate(log) { return log.date === date; }
            const index = workLogs.findIndex(findEditDate);
            if (index === -1) { showToast('记录不存在'); closeEditModal(); return; }
            workLogs[index] = { date: date, content: content, hours: hours, wage: wage };
            sortWorkLogs();
            localStorage.setItem('workLogs', JSON.stringify(workLogs));
            updateSummary();
            renderCalendarView();
            closeEditModal();
            showToast('记录已更新');
            await triggerAutoSync();
        }

        // ============================================================
        // 统计模块
        // ============================================================
        function updateSummary() {
            function sumHours(sum, log) { return sum + log.hours; }
            function sumWages(sum, log) { return sum + (log.hours * log.wage); }
            const totalHours = workLogs.reduce(sumHours, 0);
            const totalWage = workLogs.reduce(sumWages, 0);
            document.getElementById('total-hours-value').innerText = totalHours.toFixed(1) + ' 天';
            document.getElementById('total-wage-value').innerText = totalWage.toFixed(2) + ' 元';
            const monthlyData = {};
            function accumulateMonthlyData(log) {
                const month = new Date(log.date).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit' });
                if (!monthlyData[month]) monthlyData[month] = { hours: 0, wage: 0 };
                monthlyData[month].hours += log.hours;
                monthlyData[month].wage += log.hours * log.wage;
            }
            workLogs.forEach(accumulateMonthlyData);
            const monthlyContainer = document.getElementById('monthly-hours');
            monthlyContainer.innerHTML = '';
            if (Object.keys(monthlyData).length === 0) {
                monthlyContainer.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无月度数据</div>';
            } else {
                function compareMonthDesc(a, b) { return b[0].localeCompare(a[0]); }
                function renderMonthlyRow(entry) {
                    const month = entry[0];
                    const data = entry[1];
                    const row = document.createElement('div');
                    row.className = 'summary-row';
                    row.innerHTML = '<span class="summary-label">' + month + '</span><span class="summary-value">' + data.hours.toFixed(1) + '天 / ' + data.wage.toFixed(2) + '元</span>';
                    monthlyContainer.appendChild(row);
                }
                Object.entries(monthlyData).sort(compareMonthDesc).forEach(renderMonthlyRow);
            }
        }

        // ============================================================
        // 日历渲染模块
        // ============================================================
        function renderCalendarView() {
            const container = document.getElementById('table-calendar-days-container');
            const titleEl = document.getElementById('table-calendar-month-year');
            const year = currentDisplayYear;
            const month = currentDisplayMonth;
            titleEl.innerText = year + '年' + (month + 1) + '月';

            const firstDay = new Date(year, month, 1);
            let startDayOfWeek = firstDay.getDay();
            startDayOfWeek = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const recordMap = new Map();
            function buildRecordMap(log) { recordMap.set(log.date, log); }
            workLogs.forEach(buildRecordMap);

            const now = new Date();
            const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
            container.innerHTML = '';

            for (let i = 0; i < startDayOfWeek; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'calendar-day';
                emptyDiv.style.cssText = 'opacity:0.4; background:transparent; box-shadow:none;';
                container.appendChild(emptyDiv);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                const record = recordMap.get(dateStr);
                const hasRecord = !!record;
                const isToday = (dateStr === todayStr);
                const isPastRest = !hasRecord && (dateStr < todayStr);

                const dayEl = document.createElement('div');
                let classes = 'calendar-day';
                if (hasRecord) classes += ' has-record';
                else if (isPastRest) classes += ' past-rest';
                else classes += ' no-record';
                if (isToday) classes += ' today';
                dayEl.className = classes;
                dayEl.dataset.date = dateStr;
                dayEl.dataset.hasRecord = hasRecord ? '1' : '0';
                if (isPastRest) dayEl.dataset.pastRest = '1';

                let innerHtml = '<div class="day-number">' + d + '</div>';
                if (hasRecord) {
                    innerHtml += '<div class="day-hours">' + record.hours + '天</div>';
                }
                dayEl.innerHTML = innerHtml;

                bindDayEvents(dayEl, dateStr, record);
                container.appendChild(dayEl);
            }
        }

        // ============================================================
        // 浮动提示模块
        // ============================================================
        function showWageTooltip(element, record, isRest, dateStr) {
            hideWageTooltip();
            if (!record && !isRest) return;

            const tooltip = document.createElement('div');
            tooltip.className = 'day-wage-tooltip';

            if (isRest) {
                tooltip.innerHTML = '<div class="tooltip-date">' + formatDateFull(dateStr) + '</div>' +
                    '<div class="tooltip-row" style="justify-content:center;padding:4px 0;">' +
                    '<span class="tooltip-value" style="color:var(--danger-color);font-size:15px;">' +
                    '<img src="https://api.iconify.design/noto-v1:carp-streamer.svg" width="16" height="16" style="vertical-align:middle;margin-right:4px;" alt="">咸鱼</span></div>';
            } else {
                const totalWage = (record.hours * record.wage).toFixed(2);
                tooltip.innerHTML = '<div class="tooltip-date">' + formatDateFull(record.date) + '</div>' +
                    '<div class="tooltip-row"><span class="tooltip-label">工时</span><span class="tooltip-value">' + record.hours + ' 天</span></div>' +
                    '<div class="tooltip-row"><span class="tooltip-label">日薪</span><span class="tooltip-value">' + record.wage + ' 元</span></div>' +
                    '<div class="tooltip-row tooltip-total"><span class="tooltip-label">当日工资</span><span class="tooltip-value">' + totalWage + ' 元</span></div>';
            }
            element.style.position = 'relative';
            element.appendChild(tooltip);
            activeWageTooltip = tooltip;

            function adjustTooltipPosition() {
                const rect = tooltip.getBoundingClientRect();
                const padding = 8;
                let needsBottom = false;
                let offsetX = -50;

                if (rect.top < padding) {
                    needsBottom = true;
                    tooltip.classList.add('position-bottom');
                }

                if (rect.left < padding) {
                    const shift = Math.abs(rect.left) + padding;
                    offsetX = -50 + (shift / rect.width * 100);
                } else if (rect.right > window.innerWidth - padding) {
                    const shift = rect.right - window.innerWidth + padding;
                    offsetX = -50 - (shift / rect.width * 100);
                }

                if (offsetX !== -50) {
                    tooltip.style.transform = 'translateX(' + offsetX + '%) scale(0.9)';
                }

                const arrow = document.createElement('div');
                arrow.className = 'wage-tooltip-arrow ' + (needsBottom ? 'arrow-top' : 'arrow-bottom');
                element.appendChild(arrow);
                tooltip._arrow = arrow;

                function animateTooltipIn() {
                    tooltip.classList.add('show');
                    if (offsetX !== -50) {
                        tooltip.style.transform = 'translateX(' + offsetX + '%) scale(1)';
                    }
                }
                requestAnimationFrame(animateTooltipIn);
            }
            requestAnimationFrame(adjustTooltipPosition);

            tooltip._autoHideTimer = setTimeout(function autoHideTooltip() { hideWageTooltip(); }, 5000);
        }

        function hideWageTooltip() {
            if (activeWageTooltip) {
                if (activeWageTooltip._autoHideTimer) {
                    clearTimeout(activeWageTooltip._autoHideTimer);
                }
                if (activeWageTooltip._arrow) {
                    activeWageTooltip._arrow.remove();
                }
                activeWageTooltip.remove();
                activeWageTooltip = null;
            }
        }

        // ============================================================
        // 日历格子事件绑定模块
        // ============================================================
        function getDayRecordFromElement(element) {
            const dateStr = element.dataset.date;
            if (element.dataset.hasRecord !== '1') return null;
            return workLogs.find(function findLogByDate(l) { return l.date === dateStr; });
        }

        function handleDayTouchStart(event) {
            const element = event.currentTarget;
            const isPastRest = element.dataset.pastRest === '1';
            const record = getDayRecordFromElement(element);
            longPressTarget = element;
            element.classList.add('pressing');

            function handleLongPress() {
                element.classList.remove('pressing');
                longPressTimer = null;
                if (isPastRest) {
                    return;
                } else if (record) {
                    hideWageTooltip();
                    showContextMenu(event.touches[0].clientX, event.touches[0].clientY, element.dataset.date, record);
                } else {
                    showToast('该日期暂无记录');
                }
            }
            longPressTimer = setTimeout(handleLongPress, LONG_PRESS_DURATION);
        }

        function handleDayTouchEnd(event) {
            const element = event.currentTarget;
            const isPastRest = element.dataset.pastRest === '1';
            const record = getDayRecordFromElement(element);
            element.classList.remove('pressing');
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
                if (record) {
                    showWageTooltip(element, record);
                } else if (isPastRest) {
                    showWageTooltip(element, null, true, element.dataset.date);
                } else {
                    showToast('该日期暂无记录');
                }
            }
            longPressTarget = null;
        }

        function handleDayTouchMove() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            if (longPressTarget) {
                longPressTarget.classList.remove('pressing');
            }
            longPressTarget = null;
        }

        function handleDayTouchCancel() {
            if (longPressTarget) {
                longPressTarget.classList.remove('pressing');
            }
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            longPressTarget = null;
        }

        function handleDayContextMenu(event) {
            event.preventDefault();
            const element = event.currentTarget;
            const isPastRest = element.dataset.pastRest === '1';
            if (isPastRest) return;
            const record = getDayRecordFromElement(element);
            if (record) {
                showContextMenu(event.clientX, event.clientY, element.dataset.date, record);
            } else {
                showToast('该日期暂无记录');
            }
        }

        function handleDayMouseDown(event) {
            if (event.button !== 0) return;
            const element = event.currentTarget;
            const isPastRest = element.dataset.pastRest === '1';
            if (isPastRest) return;
            const record = getDayRecordFromElement(element);
            longPressTarget = element;
            element.classList.add('pressing');

            function handleMouseLongPress() {
                element.classList.remove('pressing');
                longPressTimer = null;
                if (record) {
                    hideWageTooltip();
                    showContextMenu(event.clientX, event.clientY, element.dataset.date, record);
                } else {
                    showToast('该日期暂无记录');
                }
            }
            longPressTimer = setTimeout(handleMouseLongPress, LONG_PRESS_DURATION);
        }

        function handleDayMouseUp(event) {
            const element = event.currentTarget;
            const isPastRest = element.dataset.pastRest === '1';
            const record = getDayRecordFromElement(element);
            element.classList.remove('pressing');
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
                if (record) {
                    showWageTooltip(element, record);
                } else if (isPastRest) {
                    showWageTooltip(element, null, true, element.dataset.date);
                } else {
                    showToast('该日期暂无记录');
                }
            }
            longPressTarget = null;
        }

        function handleDayMouseLeave() {
            if (longPressTarget) {
                longPressTarget.classList.remove('pressing');
            }
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            longPressTarget = null;
        }

        function bindDayEvents(element, dateStr, record) {
            element.dataset.date = dateStr;
            if (record) {
                element.dataset.hasRecord = '1';
                element.dataset.hours = record.hours;
                element.dataset.wage = record.wage;
                if (record.content) element.dataset.content = '1';
            }
            element.addEventListener('touchstart', handleDayTouchStart, { passive: true });
            element.addEventListener('touchend', handleDayTouchEnd, { passive: true });
            element.addEventListener('touchmove', handleDayTouchMove, { passive: true });
            element.addEventListener('touchcancel', handleDayTouchCancel, { passive: true });
            element.addEventListener('contextmenu', handleDayContextMenu);
            element.addEventListener('mousedown', handleDayMouseDown);
            element.addEventListener('mouseup', handleDayMouseUp);
            element.addEventListener('mouseleave', handleDayMouseLeave);
        }

        // ============================================================
        // 上下文菜单模块
        // ============================================================
        function showContextMenu(x, y, dateStr, record) {
            contextMenuDate = dateStr;
            contextMenuRecord = record;
            const menu = document.getElementById('context-menu');
            const overlay = document.getElementById('context-menu-overlay');
            const viewBtn = document.getElementById('menu-view');
            if (record && record.content) {
                viewBtn.style.display = 'flex';
            } else {
                viewBtn.style.display = 'none';
            }
            overlay.style.display = 'block';
            menu.style.display = 'flex';

            const menuWidth = 160;
            const menuHeight = record && record.content ? 150 : 110;
            let posX = x;
            let posY = y;
            if (posX + menuWidth > window.innerWidth - 10) {
                posX = window.innerWidth - menuWidth - 10;
            }
            if (posX < 10) posX = 10;
            if (posY + menuHeight > window.innerHeight - 10) {
                posY = window.innerHeight - menuHeight - 10;
            }
            if (posY < 10) posY = 10;
            menu.style.left = posX + 'px';
            menu.style.top = posY + 'px';
        }

        function hideContextMenu() {
            document.getElementById('context-menu').style.display = 'none';
            document.getElementById('context-menu-overlay').style.display = 'none';
            contextMenuDate = null;
            contextMenuRecord = null;
        }

        function handleMenuAction(action) {
            if (!contextMenuDate) return;
            const targetDate = contextMenuDate;
            hideContextMenu();
            if (action === 'view') {
                showContent(targetDate);
            } else if (action === 'edit') {
                openEditModal(targetDate);
            } else if (action === 'delete') {
                showDeleteConfirm(targetDate);
            }
        }

        // ============================================================
        // 导航与工具模块
        // ============================================================
        function changeMonth(delta) {
            currentDisplayMonth += delta;
            if (currentDisplayMonth < 0) { currentDisplayMonth = 11; currentDisplayYear--; }
            else if (currentDisplayMonth > 11) { currentDisplayMonth = 0; currentDisplayYear++; }
            renderCalendarView();
        }

        function switchPage(pageId) {
            hideWageTooltip();
            function deactivatePage(p) { p.classList.remove('active'); }
            function deactivateNav(btn) { btn.classList.remove('active'); }
            function findNavForPage(btn) {
                var onclick = btn.getAttribute('onclick');
                return onclick && onclick.indexOf("'" + pageId + "'") !== -1;
            }
            document.querySelectorAll('.page').forEach(deactivatePage);
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-button').forEach(deactivateNav);
            var activeBtn = Array.from(document.querySelectorAll('.nav-button')).find(findNavForPage);
            if (activeBtn) activeBtn.classList.add('active');
            if (pageId === 'table-page') renderCalendarView();
            else if (pageId === 'summary-page') updateSummary();
            window.scrollTo(0, 0);
        }

        function exportData() {
            const data = { workLogs: workLogs, lastWage: lastWage, lastHours: lastHours };
            const jsonString = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '工作记录_' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            setTimeout(function revokeUrlTimer() { URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);
            showToast('数据已导出');
        }

        function importData() {
            var importInput = document.createElement('input');
            importInput.type = 'file';
            importInput.accept = '.json,application/json';

            function handleImportFileSelect(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();

                async function handleImportLoad(ev) {
                    try {
                        var imported = JSON.parse(ev.target.result);
                        if (!imported.workLogs || !Array.isArray(imported.workLogs)) throw new Error('格式错误');
                        workLogs = imported.workLogs;
                        lastWage = imported.lastWage || null;
                        lastHours = imported.lastHours || null;
                        sortWorkLogs();
                        localStorage.setItem('workLogs', JSON.stringify(workLogs));
                        if (lastWage !== null) localStorage.setItem('lastWage', lastWage);
                        if (lastHours !== null) localStorage.setItem('lastHours', lastHours);
                        clearForm();
                        updateSummary();
                        renderCalendarView();
                        showToast('导入成功');
                        await triggerAutoSync();
                    } catch (err) { showToast('导入失败'); }
                }
                reader.onload = handleImportLoad;
                reader.readAsText(file);
            }
            importInput.onchange = handleImportFileSelect;
            importInput.click();
        }

        // ============================================================
        // 全局事件绑定
        // ============================================================
        function initApp() {
            loadGithubConfig();
            clearForm();
            sortWorkLogs();
            updateSummary();
            var today = new Date();
            currentDisplayYear = today.getFullYear();
            currentDisplayMonth = today.getMonth();
            switchPage('add-page');
            setTimeout(function delayedSetDate() { setDefaultDate(); }, 50);
        }
        window.onload = initApp;

        function handleVisibilityChange() {
            if (!document.hidden) setDefaultDate();
        }
        window.addEventListener('visibilitychange', handleVisibilityChange);

        function handleDeleteOverlayClick(e) { if (e.target === this) cancelDelete(); }
        document.getElementById('delete-confirm').addEventListener('click', handleDeleteOverlayClick);

        function handleDeleteAllOverlayClick(e) { if (e.target === this) cancelDeleteAll(); }
        document.getElementById('delete-all-confirm').addEventListener('click', handleDeleteAllOverlayClick);

        function handleEditOverlayClick(e) { if (e.target === this) closeEditModal(); }
        document.getElementById('edit-modal').addEventListener('click', handleEditOverlayClick);

        function handleKeydown(e) {
            if (e.key === 'Escape') {
                cancelDelete();
                cancelDeleteAll();
                closeEditModal();
                hideContextMenu();
            }
        }
        document.addEventListener('keydown', handleKeydown);

        function handleWindowScroll() { hideContextMenu(); hideWageTooltip(); }
        function handleWindowResize() { hideContextMenu(); hideWageTooltip(); }
        window.addEventListener('scroll', handleWindowScroll, { passive: true });
        window.addEventListener('resize', handleWindowResize, { passive: true });

        function handleDocumentClick(e) {
            if (!e.target.closest('.calendar-day') && activeWageTooltip) {
                hideWageTooltip();
            }
        }
        document.addEventListener('click', handleDocumentClick);
    </script>
</body>
